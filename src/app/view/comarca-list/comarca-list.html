<div class="p-3">
    <h3 class="mb-3">
        Comarques
    </h3>
    <div class="list-group">
        @for(comarca of comarques(); track comarca) {
        <button class="list-group-item list-group-item-action" (click)="onSelectComarca(comarca)">
            {{ comarca }}
        </button>
        }
    </div>
</div>
